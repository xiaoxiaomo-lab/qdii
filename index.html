<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QDII 溢价监控</title>
<style>
  :root {
    --bg: #f8f9fb;
    --surface: #ffffff;
    --border: #e8eaef;
    --text: #1a1d28;
    --text-secondary: #6b7187;
    --text-tertiary: #9ca3b4;
    --accent: #2563eb;
    --accent-dim: #eff4ff;
    --green: #10b981;
    --green-bg: #ecfdf5;
    --red: #ef4444;
    --red-bg: #fef2f2;
    --amber: #f59e0b;
    --amber-bg: #fffbeb;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,0.02), 0 2px 8px rgba(0,0,0,0.03);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.03), 0 4px 16px rgba(0,0,0,0.05);
  }

  [data-theme="dark"] {
    --bg: #0f1117;
    --surface: #1a1d28;
    --border: #262a36;
    --text: #eef0f6;
    --text-secondary: #8b90a5;
    --text-tertiary: #5d6275;
    --accent: #4f8bff;
    --accent-dim: #141c33;
    --green: #22c55e;
    --green-bg: #0a1f15;
    --red: #f87171;
    --red-bg: #1f0d0d;
    --amber: #fbbf24;
    --amber-bg: #1f1808;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.4);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    transition: background 0.3s, color 0.3s;
  }

  /* ── Layout ── */
  .app { max-width: 1100px; margin: 0 auto; padding: 28px 24px 48px; display: flex; flex-direction: column; gap: 24px; }

  /* ── Header ── */
  .header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  /* ── Theme toggle ── */
  .theme-toggle {
    position: relative; display: inline-grid; grid-template-columns: repeat(2, 36px);
    align-items: center; gap: 0; padding: 3px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg); cursor: pointer;
  }
  .theme-toggle::before {
    content: ""; position: absolute; top: 3px; left: 3px;
    width: 36px; height: calc(100% - 6px); border-radius: 7px;
    background: var(--surface); box-shadow: var(--shadow);
    transform: translateX(0);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  [data-theme="light"] .theme-toggle::before { transform: translateX(36px); }
  .theme-btn {
    position: relative; z-index: 1; border: none; border-radius: 7px;
    width: 36px; height: 30px; padding: 0; background: transparent;
    color: var(--text-tertiary); cursor: pointer;
    transition: color 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .theme-btn.active { color: var(--text); }
  .theme-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; width: fit-content; }
  .tab {
    padding: 8px 18px; border-radius: 7px; border: none; background: transparent;
    font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── Cards ── */
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px 24px;
    box-shadow: var(--shadow); transition: box-shadow 0.2s, border-color 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-md); border-color: #d0d5e0; }
  [data-theme="dark"] .card:hover { border-color: #353a4a; }

  .card-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
  .card-value { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 6px; }
  .card-value.up { color: var(--green); }
  .card-value.down { color: var(--red); }
  .card-value.neutral { color: var(--text); }
  .card-value .arrow { font-size: 16px; flex-shrink: 0; }
  .card-note { margin-top: 6px; font-size: 12px; color: var(--text-tertiary); }

  /* ── Panel ── */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .panel-head { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 24px 0; gap: 16px; }
  .panel-head h2 { font-size: 17px; font-weight: 600; }
  .panel-head p { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
  .panel-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  /* ── Status dot ── */
  .status-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .status-dot::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
  .status-dot.ok::before { background: var(--green); }
  .status-dot.err::before { background: var(--red); }

  /* ── Button ── */
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.15s; font-family: inherit; white-space: nowrap;
  }
  .btn:hover { background: var(--bg); border-color: #c8cdd8; }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.9; background: var(--accent); }

  /* ── Filters row ── */
  .filters { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 16px 24px 0; flex-wrap: wrap; }
  .filter-tabs { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .filter-tab {
    padding: 6px 14px; border-radius: 6px; border: none; background: transparent;
    font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .filter-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

  .filter-right { display: flex; align-items: center; gap: 10px; }

  .switch-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); font-size: 12px; font-weight: 500;
    color: var(--text-secondary); cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .switch-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-tertiary); pointer-events: none; }
  .search-input {
    padding: 7px 14px 7px 34px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); font-size: 12px; font-family: inherit; color: var(--text);
    outline: none; width: 200px; transition: all 0.15s;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); width: 240px; }
  .search-input::placeholder { color: var(--text-tertiary); }

  /* ── Table ── */
  .table-wrap { padding: 16px 24px 20px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 10px 12px;
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 13px 12px; font-size: 13px;
    border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg); }

  .fund-name { font-weight: 600; font-size: 13px; }
  .fund-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  .val-up { color: var(--green); font-variant-numeric: tabular-nums; }
  .val-down { color: var(--red); font-variant-numeric: tabular-nums; }
  .val-neutral { color: var(--text-secondary); font-variant-numeric: tabular-nums; }

  th.sortable { cursor: pointer; user-select: none; }
  th.sortable::after { content: " ↕"; opacity: 0.25; font-size: 10px; }
  th.sortable.asc::after { content: " ↑"; opacity: 0.8; }
  th.sortable.desc::after { content: " ↓"; opacity: 0.8; }

  /* ── Badges ── */
  .badge {
    display: inline-flex; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-blue { background: var(--accent-dim); color: var(--accent); }

  .view-panel { display: flex; flex-direction: column; gap: 24px; }
  .view-panel[hidden] { display: none; }

  @media (max-width: 640px) {
    .app { padding: 20px 16px 40px; gap: 16px; }
    .cards { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header h1 { font-size: 22px; }
    .card { padding: 18px 20px; }
    .card-value { font-size: 26px; }
    .table-wrap { padding: 12px 16px 16px; }
    thead th, tbody td { padding: 10px 8px; font-size: 12px; }
    .panel-head { flex-direction: column; padding: 18px 20px 0; }
    .filters { flex-direction: column; align-items: stretch; padding: 12px 20px 0; }
    .filter-right { flex-direction: column; align-items: stretch; }
    .search-input, .search-input:focus { width: 100%; }
  }
</style>
</head>

  const dlt=pickFirstText(bd,["MAXSG","MAXSGALL","DTMAXSG","DRSGED","SGSX","SGED","LIMITBUY","BUYUPPER","PURCHASELIMIT","PURCHASE_LIMIT","日申购上限","单日申购上限","单日限额","购买上限"])||extractLimitText("",collectPlainTexts(bd).join(" / "));
  const dlv=parseAmountValue(dlt), cs=st?cleanStatusText(st):"", status=cs||(dlt?"限购":""), badge=getQuotaBadge(status||"可申购",dlt);
  return{name,fundCode:code,status:status||"可申购",statusRaw:st||"",dailyLimitText:dlt,dailyLimitValue:dlv,holdingFeeText:hft||"--",badgeClass:badge.className,badgeLabel:badge.label,source:"东方财富"};
}

function extractBuyStatus(purchase) { const raw=purchase?.buySedemption; const values=collectPlainTexts(raw).map(t=>t.replace(/\[object Object\]/g,"").trim()).filter(Boolean); const st=values.find(t=>/(暂停申购|开放申购|限制大额申购|暂停大额申购|限大额申购|可申购|不可申购|申购关闭|申购开放)/.test(t)); return{status:st?cleanStatusText(st):"未知",raw:values.join(" / ")}; }

function extractLimitText(primaryText, rawText) {
  const p=normalizeText(primaryText); if(p&&!/^\[object Object\]$/.test(p))return p;
  const r=normalizeText(rawText); const patterns=[/(?:限大额|限制大额|大额申购|大额限购)[^0-9一二三四五六七八九十百千万亿]*?([0-9,.]+(?:\.\d+)?\s*(?:亿[元]?|万[元]?|[元]))/,/(?:单日|每日|日累计|累计|限额|上限|额度|购买上限)[^0-9一二三四五六七八九十百千万亿]*([0-9,.]+(?:\.\d+)?\s*(?:亿元|万元|元|亿|万)?)/,/([0-9,.]+(?:\.\d+)?\s*(?:亿元|万元|元|亿|万))[^/，。；;]*(?:单日|每日|日累计|累计|限额|上限|额度|购买上限)/];
  for(const ptn of patterns){const m=r.match(ptn); if(m)return m[1].replace(/\s+/g,"");} return"";
}

function getQuotaBadge(status, limitText) {
  const t=`${status} ${limitText}`;
  if(/暂停|不可|关闭/.test(t))return{className:"badge-red",label:"暂停"};
  if(/限|限制|暂停大额/.test(t))return{className:"badge-amber",label:"限购"};
  if(/开放|申购|可买|买入/.test(t))return{className:"badge-green",label:"可申购"};
  return{className:"badge-blue",label:"未知"};
}

function buildQuotaFromDetail(item, detailData) {
  const{purchase}=detailData, sm=extractBuyStatus(purchase), dfl=purchase?.dailyLimit&&parseAmountValue(purchase.dailyLimit)?purchase.dailyLimit:"", dlt=extractLimitText(purchase?.dailyLimit,sm.raw)||dfl, mp=normalizeText(purchase?.minPurchase), dlv=parseAmountValue(dlt), is=sm.status!=="未知"||!mp?sm.status:"可申购", badge=getQuotaBadge(is,dlt);
  return{name:purchase?.name||item.name,fundCode:purchase?.code||item.fundCode,status:is,statusRaw:sm.raw,dailyLimitText:dlt,dailyLimitValue:dlv,holdingFeeText:getHoldingFeeText(item,"--"),badgeClass:badge.className,badgeLabel:badge.label,source:"东方财富详情页"};
}

function applyQuotaOverride(item, quota) {
  const o=quotaOverrides[item.fundCode||quota?.fundCode]; if(!o)return quota;
  const ha=typeof quota?.dailyLimitValue==="number"&&!Number.isNaN(quota.dailyLimitValue), dlt=ha?quota?.dailyLimitText:(quota?.dailyLimitText||o.dailyLimitText||(o.status&&/限/.test(o.status)?o.status:"")||""), status=ha&&quota?.status&&quota.status!=="未知"?quota.status:o.status, badge=getQuotaBadge(status,dlt);
  return{...(quota||{}),name:quota?.name||item.name,fundCode:quota?.fundCode||item.fundCode,status,dailyLimitText:dlt,dailyLimitValue:quota?.dailyLimitValue||parseAmountValue(dlt),badgeClass:badge.className,badgeLabel:badge.label,source:quota?.source?`${quota.source} / 交易状态兜底`:"交易状态兜底"};
}

async function fetchOtcQuota(item) {
  let quota; try{quota=await fetchEastmoneyMobileQuota(item.fundCode);}catch(e){console.error(e);}
  if(!quota){try{const dd=await loadEastmoneyFundScript(item.fundCode);quota=buildQuotaFromDetail(item,dd);}catch(e){console.error(e);}}
  quota=applyQuotaOverride(item,quota);
  return{...item,name:quota.name||item.name,fundCode:quota.fundCode||item.fundCode,status:quota.status,statusRaw:quota.statusRaw,dailyLimitText:quota.dailyLimitText,dailyLimitValue:quota.dailyLimitValue,badgeClass:quota.badgeClass,badgeLabel:quota.badgeLabel,source:quota.source,holdingFeeText:getHoldingFeeText({...item,fundCode:quota.fundCode||item.fundCode},quota.holdingFeeText),updatedAt:new Date()};
}

function getFamilyKey(item) {
  const base=normalizeFundName(item.name).replace(/(?:[ACEI])(?:类|人民币|\(人民币\)|（人民币）)?$/g,"").replace(/(联接|连接)$/g,"").trim();
  const sc=item.shareClass||inferShareClassFromFundName(item.name||""), lg=(sc==="A"||sc==="C")?"AC":(sc||"AC");
  return`${item.indexType}:${base}:${lg}`;
}

async function fetchOtcQuotaData(forceRefresh=false) {
  if(!forceRefresh&&quotaCache&&quotaCache.every(i=>"holdingFeeText"in i)&&Date.now()-quotaCacheAt<AUTO_REFRESH_MS)return quotaCache;
  const resolvedList=await resolveOtcQdiiList(), families=new Map();
  for(const item of resolvedList){const k=getFamilyKey(item);if(!families.has(k))families.set(k,[]);families.get(k).push(item);}
  const loadFamily=async([,members])=>{
    const rep=members.find(m=>m.fundCode)||members[0];
    if(!rep.fundCode)return members.map(i=>({...i,fundCode:i.fundCode||"--",status:"未匹配代码",dailyLimitText:"",holdingFeeText:getHoldingFeeText(i,"--"),badgeClass:"badge-blue",badgeLabel:"未匹配",source:"未匹配基金代码",updatedAt:new Date()}));
    let quota; try{quota=await fetchOtcQuota(rep);}catch(e){console.error(e);return members.map(i=>({...i,fundCode:i.fundCode||"--",status:"查询失败",dailyLimitText:"",holdingFeeText:getHoldingFeeText(i,"--"),badgeClass:"badge-red",badgeLabel:"失败",source:"查询失败",updatedAt:new Date()}));}
    return members.map(i=>({...i,fundCode:i.fundCode||quota.fundCode,name:i.name,status:quota.status,dailyLimitText:quota.dailyLimitText,dailyLimitValue:quota.dailyLimitValue,badgeClass:quota.badgeClass,badgeLabel:quota.badgeLabel,source:quota.source,holdingFeeText:getHoldingFeeText(i,i.fundCode===quota.fundCode?quota.holdingFeeText:holdingFeeOverrides[i.fundCode]?"--":quota.holdingFeeText),updatedAt:new Date()}));
  };
  const fr=await runWithConcurrency([...families],6,loadFamily), rows=fr.flat().filter(i=>i.badgeLabel!=="失败"&&i.badgeLabel!=="未匹配"&&isAllowedOtcFundName(i.name||""));
  quotaCache=rows; quotaCacheAt=Date.now(); return quotaCache;
}

async function runWithConcurrency(items, limit, worker) { const r=[]; let c=0; const runners=Array.from({length:Math.min(limit,items.length)},async()=>{while(c<items.length){const i=c;c+=1;r[i]=await worker(items[i]);}}); await Promise.all(runners); return r; }
async function fetchQdiiNavMap() { const m={}; for(const item of qdiiList){try{m[item.symbol]=await fetchLatestFundNav(item.fundCode);}catch(e){m[item.symbol]=undefined;}} return m; }
async function fetchFallbackNavMap(items) { const m={}; for(const item of items){try{m[item.symbol]=await fetchLatestFundNav(item.fundCode);}catch(e){m[item.symbol]=undefined;}} return m; }

function getPremiumMeta(premium) {
  if(typeof premium!=="number"||Number.isNaN(premium))return{premiumClass:"badge-blue",premiumLabel:"未知"};
  if(premium<0)return{premiumClass:"badge-green",premiumLabel:"折价"};
  if(premium<1.5)return{premiumClass:"badge-blue",premiumLabel:"正常"};
  if(premium<3.0)return{premiumClass:"badge-amber",premiumLabel:"中溢价"};
  return{premiumClass:"badge-red",premiumLabel:"高溢价"};
}

function updateStatus(text, state) { const s=document.getElementById("fetchStatus"); s.textContent=text; s.className=`status-dot ${state||""}`.trim(); }
function updateQuotaStatus(text, state) { const s=document.getElementById("quotaStatus"); s.textContent=text; s.className=`status-dot ${state||""}`.trim(); }

function setRefreshState(loading) { isRefreshing=loading; const b=document.getElementById("refreshButton"); b.disabled=loading; b.textContent=loading?"刷新中…":"刷新"; }
function setQuotaRefreshState(loading) { isQuotaRefreshing=loading; const b=document.getElementById("quotaRefreshButton"); b.disabled=loading; b.textContent=loading?"刷新中…":"刷新"; }

function runManualRefresh(key, callback) { const n=Date.now(); if(n-(manualRefreshTimes[key]||0)<500)return; manualRefreshTimes[key]=n; callback(); }

function updateSummaryCards(items) {
  const valid=items.filter(i=>typeof i.premium==="number"&&!Number.isNaN(i.premium));
  document.getElementById("fundCount").textContent=String(items.length);
  if(!valid.length){ document.getElementById("maxPremiumNote").textContent="等待数据"; document.getElementById("minPremiumNote").textContent="等待数据"; return; }
  const max=valid.reduce((b,i)=>i.premium>b.premium?i:b,valid[0]), min=valid.reduce((b,i)=>i.premium<b.premium?i:b,valid[0]);
  const maxEl=document.getElementById("maxPremium"); maxEl.textContent=formatPercent(max.premium); maxEl.className=`card-value ${getTrendClass(max.premium)}`;
  document.getElementById("maxPremiumNote").textContent=`${max.name} · ${max.symbol.replace(/^(sh|sz)/,"").toUpperCase()}`;
  const minEl=document.getElementById("minPremium"); minEl.textContent=formatPercent(min.premium); minEl.className=`card-value ${getTrendClass(min.premium)}`;
  document.getElementById("minPremiumNote").textContent=`${min.name} · ${min.symbol.replace(/^(sh|sz)/,"").toUpperCase()}`;
}

function updateQdiiData(tencentData, qdiiNavMap) {
  qdiiData=qdiiList.map(item=>{
    const data=tencentData[item.symbol], navData=qdiiNavMap[item.symbol], price=data?.price, liveNav=typeof data?.nav==="number"&&!Number.isNaN(data.nav)&&data.nav>0?data.nav:undefined, fallbackNav=navData?.nav, nav=liveNav??fallbackNav, navDate=liveNav?undefined:navData?.navDate;
    const livePremium=typeof data?.premium==="number"&&!Number.isNaN(data.premium)?data.premium:undefined, premium=livePremium??(typeof price==="number"&&typeof nav==="number"&&nav>0?((price-nav)/nav)*100:undefined);
    const{premiumClass,premiumLabel}=getPremiumMeta(premium);
    return{...item,price,nav,navDate,premium,premiumClass,premiumLabel};
  });
}

function getFilteredItems() {
  return qdiiData.filter(item=>{
    if(currentQdiiFilter!=="all"&&item.indexType!==currentQdiiFilter)return false;
    if(currentQdiiSearch){const q=currentQdiiSearch.toLowerCase(); if(!item.name.toLowerCase().includes(q)&&!item.symbol.replace(/^(sh|sz)/,"").includes(q))return false;}
    return true;
  });
}

function renderQdiiTable() {
  const tbody=document.getElementById("qdiiTable"), items=getFilteredItems();
  items.sort((a,b)=>{const va=a[currentQdiiSort.key],vb=b[currentQdiiSort.key]; if(va===undefined)return currentQdiiSort.desc?1:-1; if(vb===undefined)return currentQdiiSort.desc?-1:1; if(typeof va==="string")return currentQdiiSort.desc?vb.localeCompare(va):va.localeCompare(vb); return currentQdiiSort.desc?vb-va:va-vb;});
  tbody.innerHTML="";
  if(!items.length){tbody.innerHTML='<tr><td colspan="5" class="val-neutral">未找到匹配的基金</td></tr>';return;}
  items.forEach(item=>{
    const row=document.createElement("tr"), dc=item.symbol.replace(/^(sh|sz)/,"").toUpperCase(), pc=getTrendClass(item.premium);
    row.innerHTML=`<td><div class="fund-name">${item.name}</div><div class="fund-meta">${dc} · ${item.symbol.startsWith("sh")?"上交所":"深交所"}</div></td><td class="val-neutral">${item.price?item.price.toFixed(3):"--"}</td><td class="val-neutral">${item.nav?item.nav.toFixed(3):"--"}<div class="fund-meta">${item.navDate?formatShortDate(item.navDate):"实时口径"}</div></td><td class="val-${pc}">${formatPercent(item.premium)}</td><td><span class="badge ${item.premiumClass}">${item.premiumLabel}</span></td>`;
    tbody.appendChild(row);
  });
}

function getFilteredQuotaItems() {
  return quotaData.filter(item=>{if(currentQuotaFilter!=="all"&&item.indexType!==currentQuotaFilter)return false; if(!quotaOptions.showPaused&&item.badgeLabel==="暂停")return false; return true;});
}

function updateQuotaSummary(items) {
  document.getElementById("quotaFundCount").textContent=String(items.length);
  const openItems=items.filter(i=>i.badgeLabel==="可申购"||i.badgeLabel==="限购"), openEl=document.getElementById("quotaOpenCount");
  openEl.textContent=String(openItems.length); openEl.className=`card-value ${openItems.length>0?"up":"neutral"}`;
  document.getElementById("quotaOpenNote").textContent=openItems.length>0?`${openItems[0].name} 等`:"暂无可申购";
  const quotaItems=items.filter(i=>typeof i.dailyLimitValue==="number"&&!Number.isNaN(i.dailyLimitValue)), maxEl=document.getElementById("quotaMaxAmount");
  if(!quotaItems.length){maxEl.textContent="--";maxEl.className="card-value neutral";document.getElementById("quotaMaxNote").textContent="接口未披露额度";return;}
  const max=quotaItems.reduce((b,i)=>i.dailyLimitValue>b.dailyLimitValue?i:b,quotaItems[0]);
  maxEl.textContent=formatAmountLabel(max.dailyLimitValue,max.dailyLimitText); maxEl.className="card-value up";
  document.getElementById("quotaMaxNote").textContent=`${max.name} · ${max.fundCode}`;
}

function renderQuotaTable() {
  const tbody=document.getElementById("quotaTable"), items=getFilteredQuotaItems().sort((a,b)=>{
    const aa=typeof a.dailyLimitValue==="number"&&!Number.isNaN(a.dailyLimitValue)?a.dailyLimitValue:-1, ab=typeof b.dailyLimitValue==="number"&&!Number.isNaN(b.dailyLimitValue)?b.dailyLimitValue:-1;
    const ss=i=>{if(i.badgeLabel==="暂停")return 2; if(typeof i.dailyLimitValue==="number"&&!Number.isNaN(i.dailyLimitValue))return 0; return 1;};
    const sd=ss(a)-ss(b); if(sd!==0)return sd; return ab-aa;
  });
  tbody.innerHTML="";
  if(!items.length){tbody.innerHTML='<tr><td colspan="5" class="val-neutral">暂无符合筛选的额度数据</td></tr>';updateQuotaSummary(items);return;}
  updateQuotaSummary(items);
  items.forEach(item=>{
    const row=document.createElement("tr"), qc=item.dailyLimitValue&&item.dailyLimitValue>=10000?"up":"neutral";
    row.innerHTML=`<td><div class="fund-name">${item.name}</div><div class="fund-meta">${item.fundCode} · ${item.indexType==="nasdaq"?"纳斯达克":"标普500"}</div></td><td><span class="badge ${item.badgeClass}">${item.badgeLabel}</span></td><td class="val-${qc}">${formatAmountLabel(item.dailyLimitValue,item.dailyLimitText)}</td><td class="val-neutral">${calcTotalHoldingFee(item.holdingFeeText)}</td><td class="val-neutral">${formatDateTime(item.updatedAt)}</td>`;
    tbody.appendChild(row);
  });
}

async function renderQuotaPage(forceRefresh=false) {
  if(isQuotaRefreshing)return;
  setQuotaRefreshState(true); updateQuotaStatus("查询中","");
  try{quotaData=await fetchOtcQuotaData(forceRefresh);quotaLoaded=true;renderQuotaTable();updateQuotaStatus(`已更新 ${new Date().toLocaleTimeString("zh-CN",{hour12:false,hour:"2-digit",minute:"2-digit"})}`,"ok");}
  catch(e){console.error(e);document.getElementById("quotaTable").innerHTML='<tr><td colspan="5" class="val-down">额度加载失败</td></tr>';updateQuotaStatus("加载失败","err");}
  finally{setQuotaRefreshState(false);}
}

async function renderPage() {
  if(isRefreshing)return;
  setRefreshState(true);
  try{
    const tencentData=await fetchTencentData(qdiiList.map(i=>i.symbol));
    updateQdiiData(tencentData,{}); updateSummaryCards(qdiiData); renderQdiiTable();
    updateStatus(`已更新 ${new Date().toLocaleTimeString("zh-CN",{hour12:false,hour:"2-digit",minute:"2-digit"})}`,"ok");
    const missing=qdiiList.filter(i=>{const d=tencentData[i.symbol];return!(typeof d?.nav==="number"&&!Number.isNaN(d.nav)&&d.nav>0)||!(typeof d?.premium==="number"&&!Number.isNaN(d.premium));});
    if(missing.length>0)fetchFallbackNavMap(missing).then(fm=>{if(!Object.keys(fm).length)return;updateQdiiData(tencentData,fm);updateSummaryCards(qdiiData);renderQdiiTable();}).catch(e=>console.error(e));
  }catch(e){console.error(e);document.getElementById("qdiiTable").innerHTML='<tr><td colspan="5" class="val-down">数据加载失败</td></tr>';updateStatus("加载失败","err");}
  finally{setRefreshState(false);}
}

function initEvents() {
  document.querySelectorAll(".view-tab").forEach(btn=>{btn.addEventListener("click",()=>{document.querySelectorAll(".view-tab").forEach(n=>n.classList.remove("active"));btn.classList.add("active");activeView=btn.dataset.view;document.getElementById("premiumView").hidden=activeView!=="premium";document.getElementById("quotaView").hidden=activeView!=="quota";if(activeView==="quota"&&!quotaLoaded)requestAnimationFrame(()=>renderQuotaPage());});});
  document.querySelectorAll(".index-tab").forEach(btn=>{btn.addEventListener("click",()=>{document.querySelectorAll(".index-tab").forEach(n=>n.classList.remove("active"));btn.classList.add("active");currentQdiiFilter=btn.dataset.indexType;renderQdiiTable();});});
  document.querySelectorAll(".quota-tab").forEach(btn=>{btn.addEventListener("click",()=>{document.querySelectorAll(".quota-tab").forEach(n=>n.classList.remove("active"));btn.classList.add("active");currentQuotaFilter=btn.dataset.quotaType;renderQuotaTable();});});
  document.querySelectorAll(".quota-option").forEach(btn=>{btn.addEventListener("click",()=>{const o=btn.dataset.quotaOption;quotaOptions[o]=!quotaOptions[o];btn.classList.toggle("active",quotaOptions[o]);btn.setAttribute("aria-pressed",String(quotaOptions[o]));renderQuotaTable();});});
  document.getElementById("qdiiSearchInput").addEventListener("input",e=>{currentQdiiSearch=e.target.value.trim();renderQdiiTable();});
  document.querySelectorAll("th.sortable").forEach(th=>{th.addEventListener("click",()=>{const k=th.dataset.sort;if(currentQdiiSort.key===k)currentQdiiSort.desc=!currentQdiiSort.desc;else{currentQdiiSort.key=k;currentQdiiSort.desc=true;}document.querySelectorAll("th.sortable").forEach(n=>n.classList.remove("asc","desc"));th.classList.add(currentQdiiSort.desc?"desc":"asc");renderQdiiTable();});});
  document.getElementById("refreshButton").addEventListener("click",()=>runManualRefresh("premium",renderPage));
  document.getElementById("quotaRefreshButton").addEventListener("click",()=>runManualRefresh("quota",()=>renderQuotaPage(true)));
}

(function init(){
  const saved=localStorage.getItem("qdii-theme"); if(saved==="light"||saved==="dark")applyTheme(saved);
  document.querySelectorAll("#themeToggle .theme-btn").forEach(btn => btn.addEventListener("click", () => applyTheme(btn.dataset.v)));
  initEvents(); requestAnimationFrame(()=>renderPage());
  setInterval(()=>{if(activeView==="quota")renderQuotaPage();else renderPage();},AUTO_REFRESH_MS);
})();
</script>
</body>
