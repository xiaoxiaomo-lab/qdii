<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QDII 溢价监控</title>
<style>
  :root {
    color-scheme: dark;
    --panel: rgba(20, 27, 42, 0.86);
    --panel-strong: rgba(30, 39, 58, 0.96);
    --line: rgba(255, 255, 255, 0.11);
    --text: #fbfdff;
    --muted: #b3bfd5;
    --green: #30d158;
    --red: #ff647c;
    --amber: #ff9f0a;
    --cyan: #64d2ff;
    --blue: #0a84ff;
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    --page-bg:
      radial-gradient(circle at top left, rgba(10, 132, 255, 0.18), transparent 30%),
      radial-gradient(circle at top right, rgba(100, 210, 255, 0.1), transparent 24%),
      linear-gradient(180deg, #111725 0%, #151c2c 48%, #0f1522 100%);
    --header-chip-bg: rgba(255, 255, 255, 0.08);
    --table-row-hover: rgba(255, 255, 255, 0.055);
    --toggle-bg: rgba(255, 255, 255, 0.06);
    --toggle-active-bg: rgba(255, 255, 255, 0.16);
    --surface-inset: rgba(255, 255, 255, 0.05);
    --toggle-thumb: #f5f7fb;
    --toggle-active-icon: #0f1522;
  }

  body[data-theme="light"] {
    color-scheme: light;
    --panel: rgba(255, 255, 255, 0.78);
    --panel-strong: rgba(255, 255, 255, 0.94);
    --line: rgba(60, 60, 67, 0.12);
    --text: #111827;
    --muted: #6b7280;
    --green: #16a34a;
    --red: #e11d48;
    --amber: #d97706;
    --cyan: #0284c7;
    --blue: #007aff;
    --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
    --page-bg:
      radial-gradient(circle at top left, rgba(0, 122, 255, 0.12), transparent 28%),
      linear-gradient(180deg, #f5f5f7 0%, #eff3f9 52%, #f7f8fb 100%);
    --header-chip-bg: rgba(255, 255, 255, 0.72);
    --table-row-hover: rgba(60, 60, 67, 0.045);
    --toggle-bg: rgba(120, 120, 128, 0.12);
    --toggle-active-bg: rgba(255, 255, 255, 0.96);
    --surface-inset: rgba(255, 255, 255, 0.56);
    --toggle-thumb: #111827;
    --toggle-active-icon: #ffffff;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--page-bg);
    color: var(--text);
  }

  .shell {
    width: min(980px, calc(100vw - 24px));
    margin: 0 auto;
    padding: 10px 0 16px;
  }

  .hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    margin-bottom: 10px;
  }

  h1 {
    margin: 0;
    font-size: clamp(24px, 2.6vw, 30px);
    line-height: 1.08;
    letter-spacing: 0;
  }

  .subtle {
    color: var(--muted);
    font-size: 12px;
    margin-top: 6px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .action-button {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 12px;
    background: var(--panel-strong);
    color: var(--text);
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    backdrop-filter: blur(20px);
  }

  .action-button:hover {
    transform: translateY(-1px);
  }

  .action-button:disabled {
    opacity: 0.6;
    cursor: wait;
    transform: none;
  }

  .theme-toggle {
    position: relative;
    display: inline-grid;
    grid-template-columns: repeat(2, 40px);
    align-items: center;
    gap: 0;
    padding: 3px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--panel-strong);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.04);
  }

  .theme-toggle::before {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 40px;
    height: calc(100% - 6px);
    border-radius: 999px;
    background: var(--toggle-thumb);
    box-shadow: 0 1px 3px rgba(15, 23, 42, 0.18);
    transform: translateX(0);
    transition: transform 0.2s ease;
  }

  body[data-theme="light"] .theme-toggle::before {
    transform: translateX(40px);
  }

  .theme-button {
    position: relative;
    z-index: 1;
    border: 0;
    border-radius: 999px;
    width: 40px;
    height: 32px;
    padding: 0;
    background: transparent;
    color: var(--muted);
    font: inherit;
    cursor: pointer;
    transition: color 0.2s ease;
  }

  .theme-button svg {
    width: 16px;
    height: 16px;
    display: block;
    margin: 0 auto;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .theme-button.active {
    color: var(--toggle-active-icon);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 10px;
  }

  .stat,
  .panel,
  .calc-container {
    padding: 14px 14px 13px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(22px);
    position: relative;
    overflow: hidden;
  }

  .stat::before,
  .panel::before,
  .calc-container::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 26%);
    pointer-events: none;
  }

  .stat-label {
    position: relative;
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 8px;
  }

  .stat-value {
    position: relative;
    font-size: clamp(22px, 2.5vw, 28px);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .stat-note,
  .panel-meta {
    position: relative;
    margin-top: 5px;
    color: var(--muted);
    font-size: 11px;
  }

  .panel {
    padding: 14px;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    padding: 0 2px;
  }

  .panel-title {
    margin: 0;
    font-size: 17px;
    letter-spacing: 0;
  }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--surface-inset);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    padding: 12px 12px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    text-align: left;
    border-bottom: 1px solid var(--line);
  }

  tbody td {
    padding: 13px 12px;
    border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    font-size: 13px;
    vertical-align: middle;
  }

  tbody tr:last-child td {
    border-bottom: 0;
  }

  tbody tr:hover {
    background: var(--table-row-hover);
  }

  tbody.clickable tr {
    cursor: pointer;
  }

  tbody.clickable tr.selected {
    background: var(--table-row-hover);
    box-shadow: inset 4px 0 0 var(--blue);
  }

  .symbol {
    font-weight: 700;
    font-size: 14px;
  }

  .name {
    color: var(--muted);
    font-size: 11px;
    margin-top: 4px;
  }

  .positive {
    color: var(--green);
    font-variant-numeric: tabular-nums;
  }

  .negative {
    color: var(--red);
    font-variant-numeric: tabular-nums;
  }

  .neutral {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    background: var(--toggle-bg);
    color: var(--muted);
    font-size: 11px;
    line-height: 1;
    border: 1px solid var(--line);
  }

  .status::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--amber);
  }

  .status.ready::before {
    background: var(--green);
  }

  .status.error::before {
    background: var(--red);
  }

  .filters {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .tabs-wrapper {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 3px;
    border-radius: 999px;
    background: var(--toggle-bg);
    border: 1px solid var(--line);
  }

  .tab-btn {
    border: 0;
    padding: 7px 12px;
    border-radius: 999px;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .tab-btn.active {
    background: var(--panel-strong);
    color: var(--text);
  }

  .search-box {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    width: 12px;
    height: 12px;
    color: var(--muted);
    pointer-events: none;
  }

  .search-input {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 12px 7px 28px;
    background: var(--surface-inset);
    color: var(--text);
    font: inherit;
    font-size: 11px;
    outline: none;
    width: 170px;
    transition: width 0.2s ease, border-color 0.2s ease;
  }

  .search-input:focus {
    width: 210px;
    border-color: var(--blue);
    background: var(--panel-strong);
  }

  th.sortable {
    cursor: pointer;
    user-select: none;
    position: relative;
    padding-right: 20px;
  }

  th.sortable::after {
    content: "↕";
    position: absolute;
    right: 6px;
    opacity: 0.3;
    font-size: 9px;
  }

  th.sortable.asc::after {
    content: "↑";
    opacity: 0.8;
    color: var(--blue);
  }

  th.sortable.desc::after {
    content: "↓";
    opacity: 0.8;
    color: var(--blue);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    line-height: 1.2;
  }

  .badge-discount {
    background: rgba(48, 209, 88, 0.12);
    color: var(--green);
    border: 1px solid rgba(48, 209, 88, 0.25);
  }

  .badge-normal {
    background: rgba(10, 132, 255, 0.12);
    color: var(--blue);
    border: 1px solid rgba(10, 132, 255, 0.25);
  }

  .badge-warning {
    background: rgba(255, 159, 10, 0.12);
    color: var(--amber);
    border: 1px solid rgba(255, 159, 10, 0.25);
  }

  .badge-danger {
    background: rgba(255, 100, 124, 0.12);
    color: var(--red);
    border: 1px solid rgba(255, 100, 124, 0.25);
  }

  .calc-container {
    margin-top: 10px;
    padding: 12px 14px;
    border-radius: 16px;
    background: var(--surface-inset);
    display: none;
  }

  .calc-container.active {
    display: block;
  }

  .calc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    padding-bottom: 6px;
  }

  .calc-title {
    font-size: 12px;
    font-weight: 700;
  }

  .calc-close {
    border: 0;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
  }

  .calc-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: center;
  }

  .calc-input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .calc-input-group label {
    font-size: 11px;
    color: var(--muted);
  }

  .calc-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .calc-input {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 30px 6px 10px;
    background: var(--panel-strong);
    color: var(--text);
    font: inherit;
    font-size: 12px;
    width: 100%;
    outline: none;
  }

  .calc-unit {
    position: absolute;
    right: 10px;
    font-size: 11px;
    color: var(--muted);
  }

  .calc-metrics {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--surface-inset);
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
  }

  .calc-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
  }

  @media (max-width: 980px) {
    .hero {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
  }

  @media (max-width: 640px) {
    .shell {
      width: min(100vw - 18px, 100%);
      padding-top: 14px;
    }

    .stats {
      grid-template-columns: 1fr;
    }

    h1 {
      font-size: 28px;
    }

    .filters,
    .panel-header {
      align-items: stretch;
      flex-direction: column;
    }

    .search-input,
    .search-input:focus {
      width: 100%;
    }

    .calc-body {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    thead th,
    tbody td {
      padding-left: 8px;
      padding-right: 8px;
    }

    .theme-toggle {
      width: auto;
    }

    .action-button,
    .theme-button {
      width: 100%;
      text-align: center;
    }
  }
</style>
</head>
<body data-theme="dark">
<div class="shell">
  <header class="hero">
    <div>
      <h1>QDII 溢价监控</h1>
      <div class="subtle">实时参考净值、场内溢价率、折价回归模拟</div>
    </div>
    <div class="controls">
      <div class="theme-toggle" role="tablist" aria-label="切换主题">
        <button class="theme-button active" type="button" data-theme-value="dark" aria-label="深色主题">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path>
          </svg>
        </button>
        <button class="theme-button" type="button" data-theme-value="light" aria-label="浅色主题">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2.2M12 19.8V22M4.93 4.93l1.56 1.56M17.51 17.51l1.56 1.56M2 12h2.2M19.8 12H22M4.93 19.07l1.56-1.56M17.51 6.49l1.56-1.56"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <section class="stats">
    <article class="stat">
      <div class="stat-label">监控基金数</div>
      <div class="stat-value neutral" id="fundCount">--</div>
      <div class="stat-note">纳斯达克、标普500、美国50</div>
    </article>
    <article class="stat">
      <div class="stat-label">最高溢价</div>
      <div class="stat-value neutral" id="maxPremium">--</div>
      <div class="stat-note" id="maxPremiumNote">等待数据</div>
    </article>
    <article class="stat">
      <div class="stat-label">最大折价</div>
      <div class="stat-value neutral" id="minPremium">--</div>
      <div class="stat-note" id="minPremiumNote">等待数据</div>
    </article>
  </section>

  <section class="panel">
    <div class="panel-header">
      <div>
        <h2 class="panel-title">基金列表</h2>
        <div class="panel-meta">优先展示行情源实时口径；缺失时回退到最新净值估算</div>
      </div>
      <div class="controls">
        <div class="status" id="fetchStatus">加载中</div>
        <button class="action-button" type="button" id="refreshButton">刷新</button>
      </div>
    </div>

    <div class="filters">
      <div class="tabs-wrapper">
        <button class="tab-btn active" type="button" data-index-type="all">全部</button>
        <button class="tab-btn" type="button" data-index-type="nasdaq">纳斯达克</button>
        <button class="tab-btn" type="button" data-index-type="sp500">标普500</button>
        <button class="tab-btn" type="button" data-index-type="us50">美国50</button>
      </div>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="qdiiSearchInput" class="search-input" type="text" placeholder="搜索基金代码或简称" aria-label="搜索基金">
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-sort="name">基金名称 / 代码</th>
            <th class="sortable" data-sort="price">二级价格</th>
            <th class="sortable" data-sort="nav">参考净值</th>
            <th class="sortable desc" data-sort="premium">溢价率</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="qdiiTable" class="clickable">
          <tr>
            <td colspan="5" class="neutral">数据加载中...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="calc-container" id="premiumCalc">
      <div class="calc-header">
        <span class="calc-title" id="calcFundTitle">溢价折损模拟器</span>
        <button class="calc-close" id="calcCloseBtn" type="button" aria-label="关闭">&times;</button>
      </div>
      <div class="calc-body">
        <div class="calc-input-group">
          <label for="calcAmountInput">模拟买入金额</label>
          <div class="calc-input-wrap">
            <input class="calc-input" id="calcAmountInput" type="number" value="10000" min="100" step="100">
            <span class="calc-unit">元</span>
          </div>
        </div>
        <div class="calc-metrics">
          <div class="calc-row"><span>当前溢价率</span><strong id="calcCurrentPremium" class="neutral">--</strong></div>
          <div class="calc-row"><span>净值回归后市值</span><strong id="calcCleanValue">--</strong></div>
          <div class="calc-row"><span>预计折损金额</span><strong id="calcLossValue" class="neutral">--</strong></div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
const qdiiList = [
  { symbol: "sh513100", fundCode: "513100", name: "国泰纳斯达克100ETF", indexType: "nasdaq" },
  { symbol: "sz159941", fundCode: "159941", name: "广发纳斯达克100ETF", indexType: "nasdaq" },
  { symbol: "sh513300", fundCode: "513300", name: "华夏纳斯达克100ETF", indexType: "nasdaq" },

  { symbol: "sz159501", fundCode: "159501", name: "嘉实纳斯达克100ETF", indexType: "nasdaq" },
  { symbol: "sz159660", fundCode: "159660", name: "汇添富纳斯达克100ETF", indexType: "nasdaq" },
  { symbol: "sh513110", fundCode: "513110", name: "华安纳斯达克100ETF", indexType: "nasdaq" },
  { symbol: "sz159696", fundCode: "159696", name: "易方达纳斯达克100ETF", indexType: "nasdaq" },
  { symbol: "sh513390", fundCode: "513390", name: "博时纳斯达克100ETF", indexType: "nasdaq" },
  { symbol: "sz159513", fundCode: "159513", name: "国联安纳斯达克100ETF", indexType: "nasdaq" },
  { symbol: "sz159509", fundCode: "159509", name: "纳指科技ETF", indexType: "nasdaq" },
  { symbol: "sh513500", fundCode: "513500", name: "博时标普500ETF", indexType: "sp500" },
  { symbol: "sz159655", fundCode: "159655", name: "华夏标普500ETF", indexType: "sp500" },
  { symbol: "sh513650", fundCode: "513650", name: "大成标普500ETF", indexType: "sp500" },
  { symbol: "sz159612", fundCode: "159612", name: "国泰标普500ETF", indexType: "sp500" },
  { symbol: "sh513850", fundCode: "513850", name: "易方达MSCI美国50ETF", indexType: "us50" },
  { symbol: "sz159577", fundCode: "159577", name: "汇添富MSCI美国50ETF", indexType: "us50" }
];

const AUTO_REFRESH_MS = 60 * 1000;
let isRefreshing = false;
let qdiiData = [];
let currentQdiiFilter = "all";
let currentQdiiSearch = "";
let currentQdiiSort = { key: "premium", desc: true };
let selectedQdiiSymbol = null;

function applyTheme(theme) {
  document.body.dataset.theme = theme;
  document.querySelectorAll(".theme-button").forEach(button => {
    button.classList.toggle("active", button.dataset.themeValue === theme);
  });
  localStorage.setItem("portfolio-theme", theme);
}

function formatPercent(value) {
  if (typeof value !== "number" || Number.isNaN(value)) {
    return "--";
  }
  const sign = value > 0 ? "+" : "";
  return `${sign}${value.toFixed(2)}%`;
}

function getTrendClass(value) {
  if (typeof value !== "number" || Number.isNaN(value)) {
    return "neutral";
  }
  if (value > 0) {
    return "positive";
  }
  if (value < 0) {
    return "negative";
  }
  return "neutral";
}

function formatShortDate(value) {
  if (!(value instanceof Date) || Number.isNaN(value.getTime())) {
    return "--";
  }
  const month = String(value.getMonth() + 1).padStart(2, "0");
  const day = String(value.getDate()).padStart(2, "0");
  return `${month}-${day}`;
}

async function fetchTencentData(symbols) {
  const url = `https://qt.gtimg.cn/q=${symbols.join(",")}`;
  const res = await fetch(url);
  const text = await res.text();
  const lines = text.split(";");
  const data = {};

  lines.forEach(line => {
    const match = line.match(/v_(.+)="(.+)"/);
    if (!match) {
      return;
    }
    const [, symbol, content] = match;
    const fields = content.split("~");
    data[symbol] = {
      price: parseFloat(fields[3]),
      premium: parseFloat(fields[77]),
      nav: parseFloat(fields[78]),
      iopv: parseFloat(fields[85])
    };
  });

  return data;
}

function cleanupEastmoneyGlobals() {
  [
    "Data_netWorthTrend",
    "Data_ACWorthTrend",
    "Data_grandTotal",
    "Data_rateInSimilarType",
    "Data_rateInSimilarPersent",
    "syl_1n",
    "syl_6y",
    "syl_3y",
    "syl_1y",
    "stockCodes",
    "zqCodes",
    "Data_fluctuationScale",
    "Data_holderStructure",
    "Data_assetAllocation",
    "Data_performanceEvaluation",
    "fS_name",
    "fS_code",
    "fund_sourceRate",
    "fund_Rate",
    "fund_minsg",
    "fund_minsgall",
    "fund_dtRate",
    "ishb",
    "weekSort",
    "monthSort",
    "yearSort",
    "hj_jzrq",
    "hj_jzzzl",
    "Data_currentFundManager",
    "Data_changeNetWorthTrend",
    "Data_buySedemption",
    "Data_CWYJ"
  ].forEach(key => {
    try {
      delete window[key];
    } catch (error) {
      window[key] = undefined;
    }
  });
}

function loadEastmoneyFundScript(fundCode) {
  return new Promise((resolve, reject) => {
    cleanupEastmoneyGlobals();
    const script = document.createElement("script");
    script.src = `https://fund.eastmoney.com/pingzhongdata/${fundCode}.js?v=${Date.now()}`;
    script.async = true;

    script.onload = () => {
      const trend = Array.isArray(window.Data_netWorthTrend) ? [...window.Data_netWorthTrend] : undefined;
      cleanupEastmoneyGlobals();
      script.remove();
      resolve({ trend });
    };

    script.onerror = () => {
      cleanupEastmoneyGlobals();
      script.remove();
      reject(new Error(`Failed to load fund data for ${fundCode}`));
    };

    document.head.appendChild(script);
  });
}

async function fetchLatestFundNav(fundCode) {
  const { trend } = await loadEastmoneyFundScript(fundCode);
  if (!Array.isArray(trend) || trend.length === 0) {
    return undefined;
  }

  const latest = trend[trend.length - 1];
  const nav = parseFloat(latest?.y);
  const timestamp = Number(latest?.x);

  if (!Number.isFinite(nav) || nav <= 0) {
    return undefined;
  }

  return {
    nav,
    navDate: Number.isFinite(timestamp) ? new Date(timestamp) : undefined
  };
}

async function fetchQdiiNavMap() {
  const navMap = {};
  for (const item of qdiiList) {
    try {
      navMap[item.symbol] = await fetchLatestFundNav(item.fundCode);
    } catch (error) {
      console.error(`Failed to load NAV for ${item.symbol}`, error);
      navMap[item.symbol] = undefined;
    }
  }
  return navMap;
}

function getPremiumMeta(premium) {
  if (typeof premium !== "number" || Number.isNaN(premium)) {
    return { premiumClass: "badge-normal", premiumLabel: "未知" };
  }
  if (premium < 0) {
    return { premiumClass: "badge-discount", premiumLabel: "折价" };
  }
  if (premium < 1.5) {
    return { premiumClass: "badge-normal", premiumLabel: "正常" };
  }
  if (premium < 3.0) {
    return { premiumClass: "badge-warning", premiumLabel: "中溢价" };
  }
  return { premiumClass: "badge-danger", premiumLabel: "高溢价" };
}

function updateStatus(text, state) {
  const status = document.getElementById("fetchStatus");
  status.textContent = text;
  status.className = `status ${state || ""}`.trim();
}

function setRefreshState(loading) {
  isRefreshing = loading;
  const button = document.getElementById("refreshButton");
  button.disabled = loading;
  button.textContent = loading ? "刷新中..." : "刷新";
}

function updateSummaryCards(items) {
  const valid = items.filter(item => typeof item.premium === "number" && !Number.isNaN(item.premium));
  document.getElementById("fundCount").textContent = String(items.length);

  if (valid.length === 0) {
    document.getElementById("maxPremiumNote").textContent = "等待数据";
    document.getElementById("minPremiumNote").textContent = "等待数据";
    return;
  }

  const max = valid.reduce((best, item) => item.premium > best.premium ? item : best, valid[0]);
  const min = valid.reduce((best, item) => item.premium < best.premium ? item : best, valid[0]);

  const maxNode = document.getElementById("maxPremium");
  maxNode.textContent = formatPercent(max.premium);
  maxNode.className = `stat-value ${getTrendClass(max.premium)}`;
  document.getElementById("maxPremiumNote").textContent = max.name;

  const minNode = document.getElementById("minPremium");
  minNode.textContent = formatPercent(min.premium);
  minNode.className = `stat-value ${getTrendClass(min.premium)}`;
  document.getElementById("minPremiumNote").textContent = min.name;
}

function updateQdiiData(tencentData, qdiiNavMap) {
  qdiiData = qdiiList.map(item => {
    const data = tencentData[item.symbol];
    const navData = qdiiNavMap[item.symbol];
    const price = data?.price;
    const liveNav = typeof data?.nav === "number" && !Number.isNaN(data.nav) && data.nav > 0 ? data.nav : undefined;
    const fallbackNav = navData?.nav;
    const nav = liveNav ?? fallbackNav;
    const navDate = liveNav ? undefined : navData?.navDate;
    const livePremium = typeof data?.premium === "number" && !Number.isNaN(data.premium) ? data.premium : undefined;
    const premium = livePremium ?? (
      typeof price === "number" && typeof nav === "number" && nav > 0
        ? ((price - nav) / nav) * 100
        : undefined
    );
    const { premiumClass, premiumLabel } = getPremiumMeta(premium);

    return {
      ...item,
      price,
      nav,
      navDate,
      premium,
      premiumClass,
      premiumLabel
    };
  });
}

function getFilteredItems() {
  return qdiiData.filter(item => {
    if (currentQdiiFilter !== "all" && item.indexType !== currentQdiiFilter) {
      return false;
    }
    if (currentQdiiSearch) {
      const query = currentQdiiSearch.toLowerCase();
      const matchesName = item.name.toLowerCase().includes(query);
      const matchesCode = item.symbol.replace(/^(sh|sz)/, "").includes(query);
      if (!matchesName && !matchesCode) {
        return false;
      }
    }
    return true;
  });
}

function renderQdiiTable() {
  const tableBody = document.getElementById("qdiiTable");
  const items = getFilteredItems();

  items.sort((a, b) => {
    const valA = a[currentQdiiSort.key];
    const valB = b[currentQdiiSort.key];
    if (valA === undefined) return currentQdiiSort.desc ? 1 : -1;
    if (valB === undefined) return currentQdiiSort.desc ? -1 : 1;
    if (typeof valA === "string") {
      return currentQdiiSort.desc ? valB.localeCompare(valA) : valA.localeCompare(valB);
    }
    return currentQdiiSort.desc ? valB - valA : valA - valB;
  });

  tableBody.innerHTML = "";

  if (items.length === 0) {
    tableBody.innerHTML = `<tr><td colspan="5" class="neutral">未找到匹配的基金</td></tr>`;
    return;
  }

  items.forEach(item => {
    const row = document.createElement("tr");
    if (selectedQdiiSymbol === item.symbol) {
      row.className = "selected";
    }

    const displayCode = item.symbol.replace(/^(sh|sz)/, "").toUpperCase();
    row.innerHTML = `
      <td>
        <div class="symbol">${item.name}</div>
        <div class="name">${displayCode} · ${item.symbol.startsWith("sh") ? "上交所" : "深交所"}</div>
      </td>
      <td class="neutral">${item.price ? item.price.toFixed(3) : "--"}</td>
      <td class="neutral">
        ${item.nav ? item.nav.toFixed(3) : "--"}
        <div class="name">${item.navDate ? formatShortDate(item.navDate) : "实时口径"}</div>
      </td>
      <td class="${getTrendClass(item.premium)}">${formatPercent(item.premium)}</td>
      <td><span class="badge ${item.premiumClass}">${item.premiumLabel}</span></td>
    `;

    row.addEventListener("click", () => selectQdiiRow(item));
    tableBody.appendChild(row);
  });
}

function selectQdiiRow(item) {
  selectedQdiiSymbol = item.symbol;
  renderQdiiTable();

  if (typeof item.premium !== "number" || !item.nav || !item.price) {
    document.getElementById("premiumCalc").classList.remove("active");
    return;
  }

  const calc = document.getElementById("premiumCalc");
  calc.classList.add("active");
  document.getElementById("calcFundTitle").textContent = `${item.name} · 折损模拟`;
  document.getElementById("calcCurrentPremium").textContent = `${formatPercent(item.premium)} (${item.premiumLabel})`;
  document.getElementById("calcCurrentPremium").className = getTrendClass(item.premium);
  updateCalculatorResults(item);
}

function updateCalculatorResults(item) {
  if (!item || typeof item.premium !== "number" || !item.nav || !item.price) {
    return;
  }

  const amount = parseFloat(document.getElementById("calcAmountInput").value) || 10000;
  const cleanValue = amount * (item.nav / item.price);
  const lossValue = amount - cleanValue;

  document.getElementById("calcCleanValue").textContent = `${cleanValue.toFixed(2)} 元`;
  document.getElementById("calcLossValue").textContent = `${lossValue > 0 ? "-" : "+"}${Math.abs(lossValue).toFixed(2)} 元`;
  document.getElementById("calcLossValue").className = getTrendClass(lossValue === 0 ? 0 : -lossValue);
}

async function renderPage() {
  if (isRefreshing) {
    return;
  }

  setRefreshState(true);
  try {
    const symbols = qdiiList.map(item => item.symbol);
    const tencentData = await fetchTencentData(symbols);
    const qdiiNavMap = await fetchQdiiNavMap();

    updateQdiiData(tencentData, qdiiNavMap);
    updateSummaryCards(qdiiData);
    renderQdiiTable();

    if (selectedQdiiSymbol) {
      const selected = qdiiData.find(item => item.symbol === selectedQdiiSymbol);
      if (selected) {
        selectQdiiRow(selected);
      }
    }

    const updatedAt = new Date().toLocaleTimeString("zh-CN", {
      hour12: false,
      hour: "2-digit",
      minute: "2-digit"
    });
    updateStatus(`已更新 ${updatedAt}`, "ready");
  } catch (error) {
    console.error(error);
    document.getElementById("qdiiTable").innerHTML = `<tr><td colspan="5" class="negative">数据加载失败</td></tr>`;
    updateStatus("行情加载失败", "error");
  } finally {
    setRefreshState(false);
  }
}

function initEvents() {
  document.querySelectorAll(".theme-button").forEach(button => {
    button.addEventListener("click", () => applyTheme(button.dataset.themeValue));
  });

  document.getElementById("refreshButton").addEventListener("click", renderPage);

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(node => node.classList.remove("active"));
      btn.classList.add("active");
      currentQdiiFilter = btn.dataset.indexType;
      renderQdiiTable();
    });
  });

  document.getElementById("qdiiSearchInput").addEventListener("input", event => {
    currentQdiiSearch = event.target.value.trim();
    renderQdiiTable();
  });

  document.querySelectorAll("th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.sort;
      if (currentQdiiSort.key === key) {
        currentQdiiSort.desc = !currentQdiiSort.desc;
      } else {
        currentQdiiSort.key = key;
        currentQdiiSort.desc = true;
      }

      document.querySelectorAll("th.sortable").forEach(node => node.classList.remove("asc", "desc"));
      th.classList.add(currentQdiiSort.desc ? "desc" : "asc");
      renderQdiiTable();
    });
  });

  document.getElementById("calcAmountInput").addEventListener("input", () => {
    const item = qdiiData.find(entry => entry.symbol === selectedQdiiSymbol);
    if (item) {
      updateCalculatorResults(item);
    }
  });

  document.getElementById("calcCloseBtn").addEventListener("click", () => {
    selectedQdiiSymbol = null;
    document.getElementById("premiumCalc").classList.remove("active");
    renderQdiiTable();
  });
}

const savedTheme = localStorage.getItem("portfolio-theme");
if (savedTheme === "light" || savedTheme === "dark") {
  applyTheme(savedTheme);
}

initEvents();
renderPage();
setInterval(() => {
  renderPage();
}, AUTO_REFRESH_MS);
</script>
